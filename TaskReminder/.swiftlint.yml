disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - force_unwrapping

included:
  - TaskReminder

excluded:
  - TaskReminderTests

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 200
  error: 300

file_length:
  warning: 300
  error: 400

function_body_length:
  warning: 40
  error: 60

cyclomatic_complexity:
  warning: 10
  error: 20

reporter: "xcode"
